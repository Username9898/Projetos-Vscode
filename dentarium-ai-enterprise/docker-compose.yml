version: '3.8'

services:
  # ==================== BANCO DE DADOS ====================
  postgres:
    image: postgres:15-alpine
    container_name: dentarium-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dentarium_ai
      POSTGRES_USER: dentarium
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dentarium2025secure}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dentarium"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dentarium-network
    labels:
      - "traefik.enable=false"

  # DuckDB analytics (servidor)
  duckdb:
    image: duckdb/duckdb:latest
    container_name: dentarium-duckdb
    restart: unless-stopped
    command: ["duckdb", "/data/analytics.duckdb", "-c", "SELECT 1"]
    volumes:
      - duckdb_data:/data
    networks:
      - dentarium-network
    healthcheck:
      test: ["CMD", "duckdb", "/data/analytics.duckdb", "-c", "SELECT 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==================== STORAGE ====================
  minio:
    image: minio/minio:latest
    container_name: dentarium-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin2025}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - dentarium-network

  # ==================== CACHE & FILAS ====================
  redis:
    image: redis:7-alpine
    container_name: dentarium-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis2025}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - dentarium-network

  # ==================== API GATEWAY ====================
  api-gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dentarium-api
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://dentarium:${DB_PASSWORD:-dentarium2025secure}@postgres:5432/dentarium_ai
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis2025}@redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin2025}
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production-32chars}
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
    volumes:
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - dentarium-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`${DOMAIN:-api.dentarium.local}`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"

  # ==================== FRONTEND ====================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: dentarium-frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      - NODE_ENV=production
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway
    networks:
      - dentarium-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`${DOMAIN:-dentarium.local}`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"

  # ==================== AI SERVICES ====================
  ocr-engine:
    build:
      context: ./ai-services/ocr-engine
      dockerfile: Dockerfile
    container_name: dentarium-ocr
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://dentarium:${DB_PASSWORD:-dentarium2025secure}@postgres:5432/dentarium_ai
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis2025}@redis:6379/1
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin2025}
      - TESSERACT_CMD=/usr/bin/tesseract
      - OLLAMA_HOST=${OLLAMA_HOST:-http://ollama:11434}
    volumes:
      - ./temp:/tmp/processing
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    deploy:
      replicas: 2
    networks:
      - dentarium-network

  dashboard-engine:
    build:
      context: ./ai-services/dashboard-engine
      dockerfile: Dockerfile
    container_name: dentarium-dashboard
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://dentarium:${DB_PASSWORD:-dentarium2025secure}@postgres:5432/dentarium_ai
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis2025}@redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dentarium-network

  spreadsheet-engine:
    build:
      context: ./ai-services/spreadsheet-engine
      dockerfile: Dockerfile
    container_name: dentarium-spreadsheet
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://dentarium:${DB_PASSWORD:-dentarium2025secure}@postgres:5432/dentarium_ai
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis2025}@redis:6379/3
      - DUCKDB_PATH=/data/analytics.db
    volumes:
      - duckdb_data:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      duckdb:
        condition: service_healthy
    networks:
      - dentarium-network

  cadcam-engine:
    build:
      context: ./ai-services/cadcam-engine
      dockerfile: Dockerfile
    container_name: dentarium-cadcam
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://dentarium:${DB_PASSWORD:-dentarium2025secure}@postgres:5432/dentarium_ai
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis2025}@redis:6379/4
      - MINIO_ENDPOINT=minio:9000
      - BLENDER_PATH=/usr/bin/blender
    volumes:
      - ./temp/cadcam:/tmp/cadcam
      - /usr/bin/blender:/usr/bin/blender:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - dentarium-network

  analytics-engine:
    build:
      context: ./ai-services/analytics-engine
      dockerfile: Dockerfile
    container_name: dentarium-analytics
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://dentarium:${DB_PASSWORD:-dentarium2025secure}@postgres:5432/dentarium_ai
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis2025}@redis:6379/5
      - OLLAMA_HOST=${OLLAMA_HOST:-http://ollama:11434}
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dentarium-network

  waste-reduction:
    build:
      context: ./ai-services/waste-reduction
      dockerfile: Dockerfile
    container_name: dentarium-waste
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://dentarium:${DB_PASSWORD:-dentarium2025secure}@postgres:5432/dentarium_ai
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis2025}@redis:6379/6
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dentarium-network

  # ==================== SELF-HEALING ====================
  self-healing:
    build:
      context: ./ai-services/self-healing
      dockerfile: Dockerfile
    container_name: dentarium-healing
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://dentarium:${DB_PASSWORD:-dentarium2025secure}@postgres:5432/dentarium_ai
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis2025}@redis:6379/7
      - PROMETHEUS_URL=http://prometheus:9090
      - GRAFANA_URL=http://grafana:3000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dentarium-network

  # ==================== MONITORAMENTO ====================
  prometheus:
    image: prom/prometheus:latest
    container_name: dentarium-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./docker/prometheus-rules:/etc/prometheus/rules
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - dentarium-network

  grafana:
    image: grafana/grafana:latest
    container_name: dentarium-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin123}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-piechart-panel,grafana-worldmap-panel
    volumes:
      - ./docker/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./docker/grafana/datasources:/etc/grafana/provisioning/datasources
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - dentarium-network

  loki:
    image: grafana/loki:latest
    container_name: dentarium-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./docker/loki-config.yml:/etc/loki/local-config.yaml
      - loki_data:/loki
    ports:
      - "3100:3100"
    networks:
      - dentarium-network

  promtail:
    image: grafana/promtail:latest
    container_name: dentarium-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./docker/promtail-config.yml:/etc/promtail/config.yml
      - /var/log:/var/log
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    networks:
      - dentarium-network

  # ==================== ORQUESTRAÇÃO ====================
  airflow-webserver:
    image: apache/airflow:2.8.0
    container_name: dentarium-airflow-web
    restart: unless-stopped
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__SQL_ALCHEMY_CONN=postgresql+psycopg2://dentarium:${DB_PASSWORD:-dentarium2025secure}@postgres:5432/dentarium_ai
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__WEBSERVER__EXPOSE_CONFIG=True
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dentarium-network
    command: bash -c "airflow db init && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com && airflow webserver"

  airflow-scheduler:
    image: apache/airflow:2.8.0
    container_name: dentarium-airflow-scheduler
    restart: unless-stopped
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__SQL_ALCHEMY_CONN=postgresql+psycopg2://dentarium:${DB_PASSWORD:-dentarium2025secure}@postgres:5432/dentarium_ai
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dentarium-network
    command: airflow scheduler

  # ==================== IA / LLM ====================
  ollama:
    image: ollama/ollama:latest
    container_name: dentarium-ollama
    restart: unless-stopped
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_MODELS=/models
    volumes:
      - ollama_models:/models
    ports:
      - "11434:11434"
    networks:
      - dentarium-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    # Para CPU-only, remova o deploy acima e use:
    # environment:
    #   - OLLAMA_NUM_PARALLEL=4

  # ==================== EXPORTAÇÕES E UTILITÁRIOS ====================
  nginx:
    image: nginx:alpine
    container_name: dentarium-nginx
    restart: unless-stopped
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./frontend/.next/static:/var/www/static:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api-gateway
      - frontend
    networks:
      - dentarium-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: dentarium-pgadmin
    restart: unless-stopped
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL:-admin@dentarium.local}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD:-admin123}
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - dentarium-network

  # ==================== MLFLOW ====================
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: dentarium-mlflow
    restart: unless-stopped
    command: mlflow ui --host 0.0.0.0 --port 5000 --backend-store-uri postgresql://dentarium:${DB_PASSWORD:-dentarium2025secure}@postgres:5432/dentarium_ai --default-artifact-root ./mlruns
    environment:
      - DATABASE_URL=postgresql://dentarium:${DB_PASSWORD:-dentarium2025secure}@postgres:5432/dentarium_ai
    volumes:
      - mlflow_data:/app/mlruns
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dentarium-network

  # ==================== REDIS INSIGHT ====================
  redis-insight:
    image: redis/redisinsight:latest
    container_name: dentarium-redis-insight
    restart: unless-stopped
    ports:
      - "5540:5540"
    volumes:
      - redis_insight_data:/data
    depends_on:
      - redis
    networks:
      - dentarium-network

volumes:
  postgres_data:
    driver: local
  duckdb_data:
    driver: local
  minio_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  loki_data:
    driver: local
  ollama_models:
    driver: local
  mlflow_data:
    driver: local
  redis_insight_data:
    driver: local

networks:
  dentarium-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16